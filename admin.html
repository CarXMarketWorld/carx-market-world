<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarX Market World Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:14px;
background:#00d2ff;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>

</head>
<body>

<h2>CarX Market World Admin</h2>

<input id="title" placeholder="Hesap Adı">
<input id="cars" placeholder="Araç Sayısı">
<input id="money" placeholder="Para">
<input id="level" placeholder="Seviye">
<input id="price" placeholder="Fiyat">
<input id="image" placeholder="Resim Linki">
<input id="telegram" placeholder="Telegram Linki">

<button onclick="addAccount()">Hesabı Ekle</button>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin.js"></script>
</body>
</html>
